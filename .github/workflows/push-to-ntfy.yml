name: Push Morning Reading to ntfy.sh

on:
  push:
    branches:
      - claude/optimistic-hawking-KmeLl
    paths:
      - 'morning_*.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest morning file
        id: get_file
        run: |
          FILE=$(ls -t morning_*.md 2>/dev/null | head -1)
          if [ -z "$FILE" ]; then
            echo "No morning file found"
            exit 1
          fi
          echo "file=$FILE" >> $GITHUB_OUTPUT
          # Read content, escape newlines for JSON
          CONTENT=$(cat "$FILE" | sed 's/\\/\\\\/g' | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
          echo "content=$CONTENT" >> $GITHUB_OUTPUT

      - name: Extract title
        id: parse
        run: |
          FILE="${{ steps.get_file.outputs.file }}"
          TITLE=$(head -1 "$FILE" | sed 's/# //')
          echo "title=$TITLE" >> $GITHUB_OUTPUT

      - name: Send full content to ntfy.sh
        run: |
          FILE="${{ steps.get_file.outputs.file }}"
          curl -X POST "https://ntfy.sh/morningreadingjk" \
            -H "Title: ${{ steps.parse.outputs.title }}" \
            -H "Priority: default" \
            -H "Tags: books,morning" \
            -H "Content-Type: text/plain" \
            --data-binary @"$FILE"
