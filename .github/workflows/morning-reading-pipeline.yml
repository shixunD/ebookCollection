name: Morning Reading Pipeline

on:
  push:
    branches:
      - claude/optimistic-hawking-KmeLl
    paths:
      - 'morning_*.md'

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find latest morning file
        id: file
        run: |
          FILE=$(ls -t morning_*.md | head -1)
          DATE=$(echo "$FILE" | grep -oP '\d{4}-\d{2}-\d{2}')
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Build plain text and send to ntfy + update RSS
        env:
          DATE: ${{ steps.file.outputs.date }}
          FILE: ${{ steps.file.outputs.file }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NICE_DATE=$(date -d "$DATE" "+%B %d, %Y")
          SEED_A=$(grep "🎲 种子 A" "$FILE" | sed 's/.*🎲 种子 A：//' | head -1)
          SEED_B=$(grep "🎲 种子 B" "$FILE" | sed 's/.*🎲 种子 B：//' | head -1)

          # Build plain text body: seeds header + stripped markdown articles
          {
            echo "$NICE_DATE"
            echo ""
            echo "🎲 种子 A：$SEED_A"
            echo ""
            echo "🎲 种子 B：$SEED_B"
            echo ""
            echo "────────────────────────────────────"
            echo ""
            cat "$FILE" \
              | sed '/^---$/d' \
              | sed 's/^#\+ //' \
              | sed 's/\*\*//g' \
              | sed 's/\*//g' \
              | sed 's/`//g'
          } > /tmp/plain.txt

          # Send to ntfy.sh (title = date, body = seeds + full articles)
          curl -X POST "https://ntfy.sh/morningreadingjk" \
            -H "Title: $NICE_DATE" \
            -H "Priority: default" \
            -H "Tags: books,morning" \
            -H "Content-Type: text/plain" \
            --data-binary @/tmp/plain.txt

          # Update RSS on main branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          git fetch origin main
          git checkout main

          export DATE NICE_DATE SEED_A SEED_B
          python3 << 'PYEOF'
import os, html
from email.utils import format_datetime
from datetime import datetime, timezone, timedelta

date_str = os.environ['DATE']
nice_date = os.environ['NICE_DATE']
seed_a = os.environ['SEED_A']
seed_b = os.environ['SEED_B']

with open('/tmp/plain.txt', 'r') as f:
    content = f.read()

tz = timezone(timedelta(hours=8))
y, m, d = [int(x) for x in date_str.split('-')]
dt = datetime(y, m, d, 7, 0, 0, tzinfo=tz)
pub_date = format_datetime(dt)

item_title = f"{nice_date} — A: {seed_a[:80]} | B: {seed_b[:80]}"
guid = f"morning-{date_str}"

new_item = f"""    <item>
      <title>{html.escape(item_title)}</title>
      <pubDate>{pub_date}</pubDate>
      <guid isPermaLink="false">{guid}</guid>
      <description><![CDATA[{content}]]></description>
    </item>"""

try:
    with open('rss.xml', 'r') as f:
        rss = f.read()
    if guid in rss:
        print(f"Entry {guid} already exists, skipping.")
    elif '<item>' in rss:
        rss = rss.replace('<item>', new_item + '\n    <item>', 1)
        with open('rss.xml', 'w') as f:
            f.write(rss)
    else:
        rss = rss.replace('</channel>', new_item + '\n  </channel>')
        with open('rss.xml', 'w') as f:
            f.write(rss)
except FileNotFoundError:
    rss = f"""<?xml version="1.0" encoding="UTF-8"?>
<rss version="2.0">
  <channel>
    <title>Morning Reading</title>
    <link>https://github.com/shixunD/ebookCollection</link>
    <description>Daily English morning reading on psychology, behavioral science, and human potential</description>
    <language>en</language>
{new_item}
  </channel>
</rss>"""
    with open('rss.xml', 'w') as f:
        f.write(rss)
PYEOF

          git add rss.xml
          if ! git diff --staged --quiet; then
            git commit -m "RSS: Add morning reading $DATE"
            git push origin main
          fi
          git checkout "$CURRENT_BRANCH"

      - name: Create PR if not exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="claude/optimistic-hawking-KmeLl"
          EXISTING=$(gh pr list --base main --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null)
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --title "Morning Reading Archive" \
              --body "Auto-generated daily morning reading. RSS feed updated on main branch at rss.xml." \
              --base main \
              --head "$BRANCH"
          else
            echo "PR #$EXISTING already open, skipping."
          fi
